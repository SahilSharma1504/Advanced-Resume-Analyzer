<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />  <!-- Cyan -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Deep Blue -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="100" fill="url(#bg)" />
  
  <g transform="translate(100, 80)">
    <!-- Base Document (Resume) -->
    <path d="M60 40 h140 a20 20 0 0 1 20 20 v200 a20 20 0 0 1 -20 20 h-180 a20 20 0 0 1 -20 -20 v-180 a20 20 0 0 1 20 -20 z" 
          fill="none" stroke="url(#primary)" stroke-width="16" stroke-linejoin="round"/>
    
    <path d="M60 40 l40 -40 h100 a20 20 0 0 1 20 20 v40 h-160 z" fill="url(#primary)" opacity="0.15" />

    <!-- Text Lines on Document -->
    <rect x="40" y="90" width="100" height="12" rx="6" fill="#3b82f6" opacity="0.6"/>
    <rect x="40" y="120" width="140" height="12" rx="6" fill="#06b6d4" opacity="0.6"/>
    <rect x="40" y="150" width="80" height="12" rx="6" fill="#3b82f6" opacity="0.6"/>
    <rect x="40" y="180" width="120" height="12" rx="6" fill="#06b6d4" opacity="0.6"/>

    <!-- AI Brain/Circuit Overlay overlapping bottom right -->
    <g transform="translate(120, 160)" filter="url(#glow)">
      <!-- Hexagon Node -->
      <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" fill="#0b0f19" stroke="#06b6d4" stroke-width="12" stroke-linejoin="round" />
      
      <!-- Inner Node Circle -->
      <circle cx="50" cy="50" r="15" fill="#3b82f6" />
      
      <!-- Circuit Branches -->
      <path d="M50 10 v-40" stroke="#06b6d4" stroke-width="10" stroke-linecap="round"/>
      <path d="M10 30 l-30 -20" stroke="#06b6d4" stroke-width="10" stroke-linecap="round"/>
      <path d="M10 70 l-30 20" stroke="#06b6d4" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>
</svg>
